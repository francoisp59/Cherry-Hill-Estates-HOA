<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Our Community HOA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-blue-800">🏠 <span class="js-community-name">Our Community HOA</span></span>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="index.html" class="text-gray-600 hover:text-blue-600 transition">Home</a>
                    <a href="documents.html" class="text-blue-600">Documents</a>
                    <a href="governance.html" class="text-gray-600 hover:text-blue-600 transition">Governance</a>
                    <a href="tips.html" class="text-gray-600 hover:text-blue-600 transition">Community Tips</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="outline-none">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-200 px-4 py-2 space-y-1">
            <a href="index.html" class="block py-2 text-gray-600">Home</a>
            <a href="documents.html" class="block py-2 text-blue-600 font-medium">Documents</a>
            <a href="governance.html" class="block py-2 text-gray-600">Governance</a>
            <a href="tips.html" class="block py-2 text-gray-600">Community Tips</a>
        </div>
    </nav>

    <!-- Header -->
    <header class="bg-blue-700 text-white py-12 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-bold mb-2">HOA Documents</h1>
            <p class="text-white/90">Official rules and governing documents for our community.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <div id="docs-container" class="grid gap-8">
            <!-- Documents will be injected here by scripts.js -->
        </div>
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 py-8 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 <span class="js-copyright-name">Our Community HOA</span>. All rights reserved.</p>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>

    <!-- Global Config & Injection -->
    <script src="config.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
